version: "3.8"

services:
  ingest:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingest
    ports:
      - "4100:4100"
    environment:
      - PORT=4100
      - STORE_TYPE=sqlite
      - DB_PATH=/data/lantern.db
    volumes:
      - ./data:/data

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    environment:
      - LANTERN_API_URL=http://ingest:4100
    depends_on:
      - ingest
