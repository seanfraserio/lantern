# lantern.yaml — GCP-native stack (Pub/Sub ingest + Cloud Tasks eval)

server:
  port: 3000
  host: 0.0.0.0
  log_level: info

storage:
  type: postgres
  database_url: ${DATABASE_URL}

ingestion:
  pubsub:
    enabled: true
    subscription_name: lantern-traces-sub
    project_id: ${GCP_PROJECT_ID}

evaluation:
  cloud_tasks:
    enabled: true
    project_id: ${GCP_PROJECT_ID}
    location: us-central1
    queue: lantern-evals
    worker_url: ${EVAL_WORKER_URL}
