name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened]

jobs:
  # ============================================
  # RESPOND - React to @claude mentions
  # ============================================
  claude-respond:
    name: Claude Respond
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # ============================================
  # REVIEW - Auto-review PRs on open/push
  # ============================================
  claude-review:
    name: Claude Review
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for:
            1. Correctness - logic errors, edge cases, off-by-one errors
            2. Security - dependency risks, unsafe patterns, data exposure
            3. API design - breaking changes, backward compatibility
            4. Code quality - dead code, unclear naming, missing error handling

            This is Lantern, an open-source TypeScript monorepo (pnpm, tsup, vitest) for AI observability.
            This is a public OSS project — pay attention to public API surface, documentation accuracy, and semver implications.
            Focus on actionable findings. Skip style nits unless they affect readability.
            Post findings as inline review comments on specific lines.
